<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Delete Task</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  </head>

  <body>
    <div class="phone">
      <div class="topbar">
        <div class="chip title">{{deadline.title}}</div>
        <a class="chip" href="/">Home</a>
      </div>

      <form class="form-wrap" method="POST" action="{{ url_for('delete_deadline', deadline_id=deadline._id) }}">
      <p style="text-align: center;">
        Are you sure you want to delete
        <strong>{{ deadline.title }}</strong>?
      </p>

    <div class="btn-group">
      <button type="submit" class="btn btn-primary">Yes, Delete</button>
      <a href="{{ url_for('list_deadlines') }}" class="btn btn-secondary">Cancel</a>
    </div>
    </form>
    </div>
  </body>
</html>
