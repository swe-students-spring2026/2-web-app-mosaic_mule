<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tasks Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  </head>

  <body>
    <div class="phone">
      <!-- Top Bar -->
      <div class="topbar">
        <div class="chip title">Deadlines List</div>
        <a class="chip" href="/">Home</a>
      </div>

      <!-- Sort/Search -->
      <div class="searchsort-row">
        <form class="searchsort-form" method="get" action="/search">
          <a class="btn btn-secondary" href="/deadlines/filter">
          Sort / Filter
          </a>
          <label for="q">Search</label>
          <input id="q" type="text" name="q" placeholder="Title / Course / Difficulty ..." />
        </div>
      </form>


      <!-- List -->
      {% if items|length == 0 %}
        <div class="form-wrap">
          <div class="chip">No deadlines yet. Click Add to create one.</div>
        </div>
      {% else %}
        {% for d in items %}
        <a class="card-link" href="{{ url_for('info_deadline_screen', deadline_id=d._id) }}">
          <div class="row">
            <div class="cell-strong">{{ d.title }}</div>
            <div>{{ d.deadline.strftime('%Y-%m-%d') }}</div>
            <div>{{ d.course }}</div>
            <div>{{ d.difficulty }}</div>
          </div>
        {% endfor %}
      {% endif %}

      <!-- Bottom Actions -->
      <div class="btn-group">
        <a class="btn btn-primary" href="/deadlines/new">Add New Deadline</a>
      </div>
    </div>
  </body>
</html>
