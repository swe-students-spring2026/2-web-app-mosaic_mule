<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
    <style>
      .header, .row { display:grid; grid-template-columns: 1.2fr 1fr 1fr 0.9fr; gap:8px; align-items:center; }
      .header { margin:16px 0 8px; color:#666; font-size:12px; }
      .row { padding:10px; border-radius:8px; margin-bottom:10px; background:#d9ffd9; }
      .cell-strong { font-weight:700; }
      .empty { color:#777; text-align:center; padding:20px 0; }
      .card-link { text-decoration:none; color:inherit; display:block; }
    </style>
  </head>

  <body>
    <div class="phone">
      <div class="topbar">
        <div class="chip">Logo</div>
        <div class="chip title">Search</div>
        <a class="chip" href="/">Home</a>
      </div>

      <form class="form-wrap" method="get" action="/search">
        <div class="form-row">
          <label for="q">Search</label>
          <input id="q" type="text" name="q" value="{{ q or '' }}" placeholder="Title / Course / Difficulty / Description" />
        </div>
      </form>

      <div class="header">
        <div>Task</div><div>Class</div><div>Deadline</div><div>Difficulty</div>
      </div>

      {% if items|length == 0 %}
        <div class="empty">No matches.</div>
      {% else %}
        {% for d in items %}
          <a class="card-link" href="{{ url_for('edit_deadline_screen', deadline_id=d._id) }}">
            <div class="row">
              <div class="cell-strong">{{ d.title }}</div>
              <div>{{ d.course }}</div>
              <div>{{ d.deadline.strftime('%Y-%m-%d') }}</div>
              <div>{{ d.difficulty }}</div>
            </div>
          </a>
        {% endfor %}
      {% endif %}
    </div>
  </body>
</html>
